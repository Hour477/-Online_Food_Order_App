<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Food Delivery UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-smooth { scroll-behavior: smooth; }
        
        /* Custom scrollbar for the long 100-row cuisine list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#d70f64',
                            light: '#f7f2f5',
                            hover: '#bd0d57'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-800 font-sans antialiased">

    <!-- Top Navigation Bar -->
    <header class="fixed top-0 w-full bg-white z-50 border-b border-gray-100 h-[72px]">
        <div class="flex items-center justify-between px-4 lg:px-6 h-full w-full max-w-[1600px] mx-auto">
            <div class="flex items-center h-full">
                <a href="#" class="flex items-center gap-2 mr-8 text-brand font-bold text-xl">
                    <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                    foodpanda
                </a>
                <div class="hidden md:flex items-center h-full space-x-1">
                    <button class="px-4 py-2 font-bold text-brand border-b-2 border-brand h-full flex items-center">Delivery</button>
                    <button class="px-4 py-2 font-medium text-gray-600 hover:text-brand hover:bg-gray-50 rounded-full h-10 flex items-center transition-colors">Pick-up</button>
                </div>
            </div>
            <div class="hidden lg:flex items-center border border-gray-200 rounded-full px-4 py-2 hover:bg-gray-50 cursor-pointer text-sm font-medium mr-4">
                <svg class="w-4 h-4 text-brand mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="truncate max-w-[200px]">New address: Select your address</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative hidden lg:block w-64">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="main-search" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-full leading-5 bg-gray-100 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition-colors" placeholder="Search restaurants...">
                </div>
                <button class="hidden md:block px-4 py-2 border border-gray-300 rounded-xl text-sm font-bold hover:bg-gray-50">Log in</button>
                <button class="hidden md:block px-4 py-2 bg-brand text-white rounded-xl text-sm font-bold hover:bg-brand-hover">Sign up</button>
                <button class="p-2 hover:bg-gray-100 rounded-full transition-colors relative text-brand">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="pt-[72px] flex max-w-[1600px] mx-auto">
        <!-- Sidebar Filters (Sticky) -->
        <aside class="w-64 flex-shrink-0 hidden lg:block sticky top-[72px] h-[calc(100vh-72px)] overflow-y-auto hide-scrollbar border-r border-gray-100 p-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Filters</h2>

            <!-- Sort by -->
            <div class="mb-6 border-b border-gray-200 pb-6">
                <h3 class="text-sm font-bold text-gray-900 mb-4">Sort by</h3>
                <div class="space-y-3" id="sort-container">
                    <label class="flex items-center cursor-pointer group"><input type="radio" name="sort" value="relevance" class="w-5 h-5 text-brand bg-gray-100 border-gray-300 focus:ring-brand accent-brand" checked><span class="ml-3 text-sm text-gray-700 group-hover:text-brand">Relevance</span></label>
                    <label class="flex items-center cursor-pointer group"><input type="radio" name="sort" value="fastest" class="w-5 h-5 text-brand bg-gray-100 border-gray-300 focus:ring-brand accent-brand"><span class="ml-3 text-sm text-gray-700 group-hover:text-brand">Fastest delivery</span></label>
                    <label class="flex items-center cursor-pointer group"><input type="radio" name="sort" value="rating" class="w-5 h-5 text-brand bg-gray-100 border-gray-300 focus:ring-brand accent-brand"><span class="ml-3 text-sm text-gray-700 group-hover:text-brand">Top rated</span></label>
                </div>
            </div>

            <!-- Quick filters & Offers -->
            <div class="mb-6 border-b border-gray-200 pb-6">
                <h3 class="text-sm font-bold text-gray-900 mb-4">Quick filters</h3>
                <label class="flex items-center cursor-pointer group mb-3">
                    <input type="checkbox" id="filter-rating" class="w-5 h-5 rounded border-gray-300 text-brand focus:ring-brand accent-brand">
                    <span class="ml-3 text-sm text-gray-700 group-hover:text-brand">Ratings 4.5+</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                    <input type="checkbox" id="filter-free-delivery" class="w-5 h-5 rounded border-gray-300 text-brand focus:ring-brand accent-brand">
                    <span class="ml-3 text-sm text-gray-700 group-hover:text-brand">Free delivery</span>
                </label>
            </div>

            <!-- Cuisines Filter (Scrollable 100 rows) -->
            <div class="mb-6 border-b border-gray-200 pb-6">
                <h3 class="text-sm font-bold text-gray-900 mb-4 flex justify-between items-center">
                    Cuisines
                    <span id="cuisine-count-badge" class="bg-gray-100 text-brand text-xs px-2 py-0.5 rounded-full hidden">0</span>
                </h3>
                
                <!-- Inner Search for Cuisines -->
                <div class="relative mb-4">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="cuisine-search" class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white text-sm focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand" placeholder="Search for cuisine">
                </div>
                
                <!-- Dynamic Checkbox Container -->
                <!-- It gets scroll classes added dynamically via JS when expanded -->
                <div class="space-y-3" id="sidebar-cuisine-list">
                    <!-- Checkboxes injected by JS -->
                </div>

                <button id="toggle-cuisines-btn" class="mt-4 flex items-center text-sm font-bold text-gray-600 hover:text-brand transition-colors w-full py-1">
                    <span>Show more</span>
                    <svg class="ml-1 h-4 w-4 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 min-w-0 p-4 md:p-8 bg-gray-50/50">
            
            <!-- Hero Banner -->
            <section class="bg-[#fdebf3] rounded-2xl p-8 md:p-12 mb-10 flex items-center justify-between relative overflow-hidden">
                <div class="z-10 max-w-lg relative">
                    <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 mb-6 leading-tight">Sign up for free delivery on your first order</h1>
                    <button class="bg-brand text-white font-bold py-3 px-6 rounded-xl hover:bg-brand-hover shadow-sm">Sign up</button>
                </div>
                <div class="absolute right-0 top-0 bottom-0 w-1/3 hidden md:block">
                    <div class="w-full h-full bg-[url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=600&auto=format&fit=crop')] bg-cover bg-center rounded-l-full opacity-80 border-8 border-white"></div>
                </div>
            </section>

            <!-- Cuisines Carousel -->
            <section class="mb-12 relative group/carousel">
                <h2 class="text-2xl font-extrabold text-gray-900 mb-6">Your favourite cuisines</h2>
                <div id="cuisine-carousel" class="flex gap-4 md:gap-8 overflow-x-auto hide-scrollbar pb-4 -mx-4 px-4 md:mx-0 md:px-0 scroll-smooth">
                    <!-- Items injected by JS -->
                </div>
                <button onclick="scrollCarousel('cuisine-carousel', 300)" class="hidden md:flex absolute right-0 top-[60%] -translate-y-[50%] bg-white rounded-full p-2 shadow-md hover:bg-gray-50 z-10 w-10 h-10 items-center justify-center border border-gray-100 opacity-0 group-hover/carousel:opacity-100 transition-opacity">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </section>

            <!-- Deals Carousel -->
            <section class="mb-12 relative group/carousel">
                <h2 class="text-2xl font-extrabold text-gray-900 mb-6">Your daily deals</h2>
                <div id="deals-carousel" class="flex gap-4 overflow-x-auto hide-scrollbar pb-4 -mx-4 px-4 md:mx-0 md:px-0 scroll-smooth">
                    <!-- Items injected by JS -->
                </div>
                <button onclick="scrollCarousel('deals-carousel', 350)" class="hidden md:flex absolute right-0 top-[60%] -translate-y-[50%] bg-white rounded-full p-2 shadow-md hover:bg-gray-50 z-10 w-10 h-10 items-center justify-center border border-gray-100 opacity-0 group-hover/carousel:opacity-100 transition-opacity">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </section>

            <!-- Restaurant Grid -->
            <section>
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-extrabold text-gray-900" id="results-title">All Restaurants</h2>
                    <span id="results-count" class="text-sm text-gray-500 font-medium"></span>
                </div>
                
                <div id="restaurant-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 gap-y-10">
                    <!-- Items injected by JS -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden py-20 text-center">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h3 class="mt-2 text-sm font-medium text-gray-900">No restaurants found</h3>
                    <p class="mt-1 text-sm text-gray-500">Try adjusting your filters or search term.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Application Logic -->
    <script>
        // --- 1. MOCK DATA ---
        
        // Seed array to base our 100 rows off of
        const seedCuisines = ['Pizza', 'Burgers', 'Asian', 'Tea & Coffee', 'Pasta', 'Healthy', 'Desserts', 'Fast Food', 'Mexican', 'Indian', 'Sushi', 'Thai', 'Vegan', 'Korean', 'BBQ', 'Seafood', 'Mediterranean', 'Bakery', 'Breakfast', 'Salads', 'Middle Eastern', 'Vietnamese', 'Dim Sum', 'Fried Chicken', 'Ice Cream', 'Juices', 'Sandwiches', 'Steak', 'Tapas', 'Wings'];
        
        // Dynamically create 100 distinct cuisines
        const allCuisines = Array.from({ length: 100 }, (_, i) => {
            const baseName = seedCuisines[i % seedCuisines.length];
            const suffix = i >= seedCuisines.length ? ` ${Math.floor(i / seedCuisines.length) + 1}` : '';
            return {
                id: `c${i+1}`,
                name: `${baseName}${suffix}`,
                // Adding generic images to the ones that will show up in the top carousel
                img: i < 15 ? [
                    'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200&h=200&fit=crop', // Pizza
                    'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200&h=200&fit=crop', // Burgers
                    'https://images.unsplash.com/photo-1559314809-0d155014e29e?w=200&h=200&fit=crop', // Asian
                    'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=200&h=200&fit=crop', // Tea
                    'https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=200&h=200&fit=crop', // Pasta
                    'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=200&h=200&fit=crop'  // Healthy
                ][i % 6] : 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=200&h=200&fit=crop'
            };
        });

        const deals = [
            { title: "Enjoy 50% off<br>with pandapro", img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&h=300&fit=crop", color: "purple", badge: "PRO" },
            { title: "Win an iPhone<br>15 Pro Max!", img: "https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?w=600&h=300&fit=crop", color: "green", preTitle: "ABA PLAY", sub: "Min spend $5.00" },
            { title: "Get $5 off<br>your delivery", img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=600&h=300&fit=crop", color: "pink" },
            { title: "Free Delivery<br>on Burgers", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&h=300&fit=crop", color: "orange" }
        ];

        const restaurants = [
            { id: 1, name: "The Pizza Company AEON", rating: 4.5, minTime: 25, maxTime: 40, price: "$$$", category: "Pizza", deliveryFee: 1.50, isPro: true, badge: "25% off", img: "https://images.unsplash.com/photo-1604382355076-af4b0eb60143?w=500&h=400&fit=crop" },
            { id: 2, name: "Little Caesars Pizza", rating: 4.2, minTime: 15, maxTime: 30, price: "$$", category: "Pizza", deliveryFee: 0, isPro: false, badge: "Up to 40% off", img: "https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=500&h=400&fit=crop" },
            { id: 3, name: "TUBE COFFEE The Villa", rating: 4.8, minTime: 5, maxTime: 20, price: "$$", category: "Tea & Coffee", deliveryFee: 0.80, isPro: false, badge: null, img: "https://images.unsplash.com/photo-1556740758-90de374c12ad?w=500&h=400&fit=crop" },
            { id: 4, name: "Burger King BKK", rating: 4.6, minTime: 10, maxTime: 25, price: "$$", category: "Burgers", deliveryFee: 1.00, isPro: true, badge: "Free Item", img: "https://images.unsplash.com/photo-1550547660-d9450f859349?w=500&h=400&fit=crop" },
            { id: 5, name: "Sushi Place Express", rating: 4.9, minTime: 30, maxTime: 45, price: "$$$", category: "Sushi", deliveryFee: 0, isPro: true, badge: "PRO 10% off", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=500&h=400&fit=crop" },
            { id: 6, name: "Green Bowl Healthy", rating: 4.1, minTime: 20, maxTime: 35, price: "$", category: "Healthy", deliveryFee: 0.50, isPro: false, badge: null, img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500&h=400&fit=crop" },
            { id: 7, name: "Pasta Corner", rating: 4.4, minTime: 15, maxTime: 30, price: "$$", category: "Pasta", deliveryFee: 2.00, isPro: false, badge: "15% off", img: "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=500&h=400&fit=crop" },
            { id: 8, name: "Sweet Treats Bakery", rating: 4.7, minTime: 10, maxTime: 20, price: "$", category: "Desserts", deliveryFee: 0, isPro: true, badge: null, img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?w=500&h=400&fit=crop" }
        ];

        // --- 2. STATE ---
        let filters = {
            search: '',
            sort: 'relevance',
            rating45: false,
            freeDelivery: false,
            selectedCuisines: []
        };
        let showAllCuisinesInSidebar = false;

        // --- 3. DOM ELEMENTS ---
        const gridEl = document.getElementById('restaurant-grid');
        const emptyStateEl = document.getElementById('empty-state');
        const countEl = document.getElementById('results-count');
        const cuisineSidebarEl = document.getElementById('sidebar-cuisine-list');

        // --- 4. RENDER FUNCTIONS ---

        function renderCuisinesCarousel() {
            const container = document.getElementById('cuisine-carousel');
            // Only take the first 12 for the horizontal carousel so it's not infinite
            const carouselItems = allCuisines.slice(0, 12);
            
            container.innerHTML = carouselItems.map(c => `
                <a href="#" class="flex flex-col items-center gap-3 min-w-[80px] group" onclick="toggleCuisineFilter('${c.name}'); return false;">
                    <div class="w-20 h-20 md:w-24 md:h-24 rounded-full overflow-hidden shadow-sm group-hover:shadow-md transition-shadow">
                        <img src="${c.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" alt="${c.name}">
                    </div>
                    <span class="text-sm font-bold text-gray-800 text-center">${c.name}</span>
                </a>
            `).join('');
        }

        function renderDeals() {
            const container = document.getElementById('deals-carousel');
            const colorMap = { purple: 'from-purple-900/80', green: 'from-green-900/80', pink: 'from-pink-900/80', orange: 'from-orange-900/80' };
            
            container.innerHTML = deals.map(d => `
                <a href="#" class="min-w-[280px] md:min-w-[320px] h-40 rounded-xl overflow-hidden relative group shadow-sm hover:shadow-md transition-shadow">
                    <img src="${d.img}" class="w-full h-full object-cover" alt="Deal">
                    <div class="absolute inset-0 bg-gradient-to-r ${colorMap[d.color]} to-transparent p-4 flex flex-col justify-center text-white">
                        ${d.badge ? `<span class="bg-brand text-xs font-bold px-2 py-1 rounded w-max mb-2">${d.badge}</span>` : ''}
                        ${d.preTitle ? `<h3 class="font-bold text-xl leading-tight text-yellow-300">${d.preTitle}</h3>` : ''}
                        <h3 class="font-bold text-xl leading-tight ${d.preTitle ? 'mt-1 text-base' : ''}">${d.title}</h3>
                        ${d.sub ? `<span class="text-xs mt-2 bg-white/20 px-2 py-1 rounded w-max backdrop-blur-sm">${d.sub}</span>` : ''}
                    </div>
                </a>
            `).join('');
        }

        function renderSidebarCuisines(searchTerm = "") {
            let displayList = allCuisines.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
            
            // Limit to 6 items if not expanded and not searching
            const limit = 6;
            const hasMore = displayList.length > limit;
            const isSearching = searchTerm.trim().length > 0;
            
            // Show all if explicitly toggled OR if user is searching
            const shouldShowAll = showAllCuisinesInSidebar || isSearching;
            const itemsToRender = shouldShowAll ? displayList : displayList.slice(0, limit);

            // Add scrollable styles dynamically when expanded to handle 100 rows beautifully
            if (shouldShowAll && displayList.length > 8) {
                cuisineSidebarEl.classList.add('max-h-[360px]', 'overflow-y-auto', 'custom-scrollbar', 'pr-2');
            } else {
                cuisineSidebarEl.classList.remove('max-h-[360px]', 'overflow-y-auto', 'custom-scrollbar', 'pr-2');
            }

            cuisineSidebarEl.innerHTML = itemsToRender.map(c => `
                <label class="flex items-center cursor-pointer group">
                    <input type="checkbox" value="${c.name}" 
                           class="cuisine-checkbox w-5 h-5 rounded border-gray-300 text-brand focus:ring-brand accent-brand"
                           ${filters.selectedCuisines.includes(c.name) ? 'checked' : ''}>
                    <span class="ml-3 text-sm text-gray-700 group-hover:text-brand">${c.name}</span>
                </label>
            `).join('');

            // Setup listeners for newly injected checkboxes
            document.querySelectorAll('.cuisine-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const val = e.target.value;
                    if (e.target.checked && !filters.selectedCuisines.includes(val)) {
                        filters.selectedCuisines.push(val);
                    } else if (!e.target.checked) {
                        filters.selectedCuisines = filters.selectedCuisines.filter(c => c !== val);
                    }
                    updateCuisineBadge();
                    applyFilters();
                });
            });

            // Toggle button logic
            const btn = document.getElementById('toggle-cuisines-btn');
            if (!hasMore || isSearching) {
                btn.style.display = 'none';
            } else {
                btn.style.display = 'flex';
                btn.querySelector('span').innerText = showAllCuisinesInSidebar ? 'Show less' : `Show more (${displayList.length - limit})`;
                btn.querySelector('svg').style.transform = showAllCuisinesInSidebar ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        }

        function updateCuisineBadge() {
            const badge = document.getElementById('cuisine-count-badge');
            if (filters.selectedCuisines.length > 0) {
                badge.innerText = filters.selectedCuisines.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderRestaurants(list) {
            countEl.innerText = `${list.length} restaurants`;
            
            if (list.length === 0) {
                gridEl.innerHTML = '';
                emptyStateEl.classList.remove('hidden');
                return;
            }
            emptyStateEl.classList.add('hidden');

            gridEl.innerHTML = list.map(r => `
                <a href="#" class="flex flex-col gap-2 group cursor-pointer">
                    <div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden">
                        <img src="${r.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" alt="${r.name}" loading="lazy">
                        <div class="absolute top-3 left-3 flex flex-col gap-1 items-start">
                            ${r.isPro ? '<span class="bg-brand text-white text-[10px] font-extrabold px-2 py-0.5 rounded-sm tracking-wide">PRO</span>' : ''}
                            ${r.badge ? `<span class="bg-brand text-white text-xs font-bold px-2 py-1 rounded-sm shadow-sm">${r.badge}</span>` : ''}
                        </div>
                    </div>
                    
                    <div class="mt-1">
                        <div class="flex justify-between items-start mb-0.5">
                            <h3 class="font-bold text-gray-900 text-lg truncate pr-2 group-hover:text-brand transition-colors">${r.name}</h3>
                            <div class="flex items-center gap-1 bg-gray-100 px-1.5 py-0.5 rounded text-sm font-bold shrink-0">
                                <svg class="w-3 h-3 text-yellow-500 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                ${r.rating}
                            </div>
                        </div>
                        <div class="text-sm text-gray-500 mb-1">${r.minTime}-${r.maxTime} min • ${r.price} • ${r.category}</div>
                        <div class="flex items-center gap-2 text-sm ${r.deliveryFee === 0 ? 'text-brand font-bold' : 'text-gray-500 font-medium'}">
                            ${r.deliveryFee === 0 ? 'Free delivery' : `$${r.deliveryFee.toFixed(2)} Delivery`}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // --- 5. LOGIC & EVENT LISTENERS ---

        function applyFilters() {
            let result = [...restaurants];

            // 1. Text Search
            if (filters.search) {
                const q = filters.search.toLowerCase();
                result = result.filter(r => r.name.toLowerCase().includes(q) || r.category.toLowerCase().includes(q));
            }

            // 2. Checkbox Filters
            if (filters.rating45) result = result.filter(r => r.rating >= 4.5);
            if (filters.freeDelivery) result = result.filter(r => r.deliveryFee === 0);
            if (filters.selectedCuisines.length > 0) {
                result = result.filter(r => filters.selectedCuisines.includes(r.category));
            }

            // 3. Sorting
            if (filters.sort === 'rating') {
                result.sort((a, b) => b.rating - a.rating);
            } else if (filters.sort === 'fastest') {
                result.sort((a, b) => a.minTime - b.minTime);
            } else {
                result.sort((a, b) => a.id - b.id); 
            }

            renderRestaurants(result);
        }

        // Helper for the top carousel clicks
        function toggleCuisineFilter(cuisineName) {
            const index = filters.selectedCuisines.indexOf(cuisineName);
            if (index > -1) filters.selectedCuisines.splice(index, 1);
            else filters.selectedCuisines.push(cuisineName);
            
            updateCuisineBadge();
            renderSidebarCuisines(document.getElementById('cuisine-search').value);
            applyFilters();
            
            // Scroll down to results smoothly
            document.getElementById('results-title').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Carousel Scroll Helper
        function scrollCarousel(id, amount) {
            document.getElementById(id).scrollBy({ left: amount, behavior: 'smooth' });
        }

        // Setup Event Listeners
        function setupListeners() {
            // Main Search
            document.getElementById('main-search').addEventListener('input', (e) => {
                filters.search = e.target.value; applyFilters();
            });

            // Sort Radios
            document.querySelectorAll('input[name="sort"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    filters.sort = e.target.value; applyFilters();
                });
            });

            // Quick Filters
            document.getElementById('filter-rating').addEventListener('change', (e) => {
                filters.rating45 = e.target.checked; applyFilters();
            });
            document.getElementById('filter-free-delivery').addEventListener('change', (e) => {
                filters.freeDelivery = e.target.checked; applyFilters();
            });

            // Sidebar Cuisine Search
            document.getElementById('cuisine-search').addEventListener('input', (e) => {
                renderSidebarCuisines(e.target.value);
            });

            // Sidebar Show More Cuisines
            document.getElementById('toggle-cuisines-btn').addEventListener('click', () => {
                showAllCuisinesInSidebar = !showAllCuisinesInSidebar;
                renderSidebarCuisines(document.getElementById('cuisine-search').value);
            });
        }

        // --- 6. INITIALIZATION ---
        function init() {
            renderCuisinesCarousel();
            renderDeals();
            renderSidebarCuisines();
            renderRestaurants(restaurants);
            setupListeners();
        }

        // Run when DOM is ready
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
